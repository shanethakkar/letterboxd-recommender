# Tooling config only. Dependencies are pinned in backend/requirements.txt
# and installed with `uv pip install -r backend/requirements.txt` (see DECISIONS.md).

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["backend/tests"]
